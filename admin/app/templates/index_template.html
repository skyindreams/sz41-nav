<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="renderer" content="webkit">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="stylesheet" type="text/css" href="icloud/css/style.css" />
<style>
	@media screen and (min-width: 768px) {
		#top { margin-top: 3% !important; }
		#wrap { overflow: auto !important; height: auto !important; min-height: 100vh !important; position: relative !important; }
		body { overflow: auto !important; }
		#footer { text-align: center !important; position: relative !important; height: auto !important; padding: 15px 0 !important; }
		.footer-contents { position: relative !important; bottom: auto !important; right: auto !important; left: auto !important; }
		#footer p { white-space: nowrap !important; }
	}
	@media only screen and (max-width: 767px) {
		.footer-contents { text-align: center !important; position: relative !important; bottom: auto !important; right: auto !important; left: auto !important; }
		#footer { position: relative !important; height: auto !important; padding: 10px 0 !important; }
		.footer-contents a { font-size: inherit !important; color: inherit !important; }
		.footer-contents .copyright { font-size: inherit !important; }
		/* 缩小换行文字行距，避免和下方图标重叠 */
		.app li a strong { line-height: 15px !important; height: 32px !important; padding: 0 !important; overflow: visible !important; }
	}
	/* Dropdown style */
	#kg-btn select {
		background: rgba(255,255,255,0.15);
		color: #fff;
		border: 1px solid rgba(255,255,255,0.3);
		border-radius: 4px;
		padding: 4px 8px;
		font-size: 14px;
		font-family: 'Helvetica Neue','Microsoft Yahei',SimHei,sans-serif;
		outline: none;
		cursor: pointer;
		min-width: 80px;
		text-align: center;
	}
	#kg-btn select option { background: #333; color: #fff; }
	/* Override app1 hidden from style.css */
	#app1 { display: block !important; }
	/* Clock styles */
	#clock { text-align: center; padding: 0 0 5px 0; }
	#clock-time { font-size: 52px; color: #fff; line-height: 1.1; letter-spacing: 3px; font-weight: 200; text-shadow: 0 0 10px rgba(0,0,0,0.3); font-family: 'Helvetica Neue',Arial,sans-serif; }
	#clock-date { font-size: 14px; color: rgba(255,255,255,0.75); margin-top: 4px; letter-spacing: 1px; }
	#clock-lunar { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; letter-spacing: 1px; }
	@media only screen and (max-width: 767px) {
		#clock-time { font-size: 36px; letter-spacing: 2px; }
		#clock-date { font-size: 12px; }
		#clock-lunar { font-size: 11px; }
	}
</style>
|<title>色艺文化传播</title>
</head>
<body>
<div id="wrap">
  <div id="top">
    <div id="logo">
      <div id="clock">
        <div id="clock-time"></div>
        <div id="clock-date"></div>
        <div id="clock-lunar"></div>
      </div>
      <div id="kg-btn">
        <select id="group-select" onchange="switchGroup(this.value)">
          {% for item in groups %}
          <option value="{{ item.group.id }}"{% if item.group.id == default_group_id %} selected{% endif %}>{{ item.group.name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
  </div>
  <div id="main">
    {% for item in groups %}
    <div id="app-{{ item.group.id }}" class="app animated fadeInLeft" style="{% if item.group.id == default_group_id %}display:block;{% else %}display:none;{% endif %}">
      <ul>
        {% for link in item.links %}
        <li>
          <a href="{{ link.url }}" target="_blank"><img class="shake" src="icloud/img/png/{{ link.icon or '1.png' }}" /><strong>{{ link.title }}</strong></a>
        </li>
        {% else %}
        <li><a href="#"><strong>暂无链接</strong></a></li>
        {% endfor %}
        {% if loop.first %}
        <li>
          <a href="/admin/" target="_blank"><img class="shake" src="icloud/img/png/Settings.png" /><strong>管理后台</strong></a>
        </li>
        {% endif %}
      </ul>
    </div>
    {% endfor %}
  </div>
</div>
<div id="footer">
  <div class="footer-contents">
    <div class="links">
      <div class="line">
        <a href="#">站长统计</a>&nbsp;<span class="footer-link-separator"></span>&nbsp;<span class="copyright">Copyright © 2022 色艺文化传播. 保留所有权利。</span>
      </div>
    </div>
  </div>
</div>
<script src="icloud/js/jquery.min.js"></script>
<script>
function switchGroup(groupId) {
  $('#main > .app').hide();
  $('#app-' + groupId).show();
}

// Lunar calendar lookup (1900-2100)
var lunarInfo = [
  0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,
  0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,
  0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,
  0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,
  0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,
  0x06ca0,0x0b550,0x15355,0x04da0,0x0a5b0,0x14573,0x052b0,0x0a9a8,0x0e950,0x06aa0,
  0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,
  0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b6a0,0x195a6,
  0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,
  0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x05ac0,0x0ab60,0x096d5,0x092e0,
  0x0c960,0x0d954,0x0d4a0,0x0da50,0x07552,0x056a0,0x0abb7,0x025d0,0x092d0,0x0cab5,
  0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x052b0,0x0a930,
  0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530,
  0x05aa0,0x076a3,0x096d0,0x04afb,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,
  0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0,
  0x14b63,0x09370,0x049f8,0x04970,0x064b0,0x168a6,0x0ea50,0x06aa0,0x1a6c4,0x0aae0,
  0x092e0,0x0d2e3,0x0c960,0x0d557,0x0d4a0,0x0da50,0x05d55,0x056a0,0x0a6d0,0x055d4,
  0x052d0,0x0a9b8,0x0a950,0x0b4a0,0x0b6a6,0x0ad50,0x055a0,0x0aba4,0x0a5b0,0x052b0,
  0x0b273,0x06930,0x07337,0x06aa0,0x0ad50,0x14b55,0x04b60,0x0a570,0x054e4,0x0d160,
  0x0e968,0x0d520,0x0daa0,0x16aa6,0x056d0,0x04ae0,0x0a9d4,0x0a4d0,0x0d150,0x0f252,
  0x0d520
];

var Gan = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
var Zhi = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
var Animals = ['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'];
var lMonthName = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
var lDayName = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
  '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
  '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];

function lunarYear(y) { return lunarInfo[y - 1900]; }
function leapMonth(y) { return lunarYear(y) & 0xf; }
function leapDays(y) { return (lunarYear(y) & 0x10000) ? 30 : 29; }
function monthDays(y,m) { return (lunarYear(y) & (0x10000 >> m)) ? 30 : 29; }

function solarToLunar(sy, sm, sd) {
  var baseDate = new Date(1900, 0, 31);
  var target = new Date(sy, sm - 1, sd);
  var offset = Math.floor((target - baseDate) / 86400000);
  
  var i, temp = 0, ly, lm, ld;
  for (i = 1900; i < 2101 && offset > 0; i++) {
    temp = lYearDays(i);
    offset -= temp;
  }
  if (offset < 0) { offset += temp; i--; }
  ly = i;
  
  var leap = leapMonth(i);
  var isLeap = false;
  for (lm = 1; lm < 13 && offset > 0; lm++) {
    if (leap > 0 && lm === (leap + 1) && !isLeap) { --lm; isLeap = true; temp = leapDays(ly); }
    else { temp = monthDays(ly, lm); }
    if (isLeap && lm === (leap + 1)) isLeap = false;
    offset -= temp;
  }
  if (offset === 0 && leap > 0 && lm === leap + 1) {
    if (isLeap) { isLeap = false; } else { isLeap = true; --lm; }
  }
  if (offset < 0) { offset += temp; --lm; }
  ld = offset + 1;
  
  return { year: ly, month: lm, day: ld, isLeap: isLeap };
}

function lYearDays(y) {
  var sum = 348;
  for (var i = 0x8000; i > 0x8; i >>= 1) sum += (lunarYear(y) & i) ? 1 : 0;
  return sum + leapDays(y);
}

function updateClock() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2, '0');
  var m = String(now.getMinutes()).padStart(2, '0');
  var s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clock-time').textContent = h + ':' + m + ':' + s;
  
  var days = ['日','一','二','三','四','五','六'];
  var y = now.getFullYear(), mo = now.getMonth() + 1, d = now.getDate();
  document.getElementById('clock-date').textContent = y + '年' + mo + '月' + d + '日 星期' + days[now.getDay()];
  
  // Lunar and GanZhi
  var lunar = solarToLunar(y, mo, d);
  var ganIdx = (y - 4) % 10;
  var zhiIdx = (y - 4) % 12;
  var animal = Animals[(y - 4) % 12];
  var ganzhi = Gan[ganIdx] + Zhi[zhiIdx] + '年';
  var lunarMonthStr = (lunar.isLeap ? '闰' : '') + lMonthName[lunar.month - 1] + '月';
  var lunarDayStr = lDayName[lunar.day - 1];
  document.getElementById('clock-lunar').textContent = ganzhi + ' ' + lunarMonthStr + lunarDayStr + ' [' + animal + '年]';
}

updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
